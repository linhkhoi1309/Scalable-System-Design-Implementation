upstream product_api_backend {
    # Mark a peer unavailable quickly after failures (passive health)
    server api-node-1:8080 max_fails=1 fail_timeout=5s;
    server api-node-2:8080 max_fails=1 fail_timeout=5s;
}

server {
    listen 80;

    location / {
        proxy_pass http://product_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Faster failover when a container stops (chaos / demo)
        proxy_connect_timeout 2s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Retry another upstream on connection/server errors.
        # GET/HEAD are retried by default; POST/PATCH/etc. are NOT retried unless
        # proxy_next_upstream non_idempotent on; is set (avoid duplicate writes).
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}
