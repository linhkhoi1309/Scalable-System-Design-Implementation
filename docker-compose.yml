# Variables: copy .env.example -> .env (see docs/setup.md). Defaults use ${VAR:-default} for local use without a .env file.

services:
  postgres-master:
    image: bitnami/postgresql:latest
    container_name: products-postgres-master
    environment:
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-postgres}
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE:-products_db}
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: ${POSTGRESQL_REPLICATION_USER:-replicator}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRESQL_REPLICATION_PASSWORD:-replicator_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $$POSTGRESQL_DATABASE -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-slave:
    image: bitnami/postgresql:latest
    container_name: products-postgres-slave
    environment:
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-postgres}
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: postgres-master
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_REPLICATION_USER: ${POSTGRESQL_REPLICATION_USER:-replicator}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRESQL_REPLICATION_PASSWORD:-replicator_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_slave_data:/bitnami/postgresql
    depends_on:
      postgres-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 15

  api-node-1:
    build:
      context: .
      dockerfile: src/ProductApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ServerId: Node_1
      ConnectionStrings__WriteDb: Host=postgres-master;Port=5432;Database=${POSTGRESQL_DATABASE:-products_db};Username=postgres;Password=${POSTGRESQL_PASSWORD:-postgres}
      ConnectionStrings__ReadDb: Host=postgres-slave;Port=5432;Database=${POSTGRESQL_DATABASE:-products_db};Username=postgres;Password=${POSTGRESQL_PASSWORD:-postgres}
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy

  api-node-2:
    build:
      context: .
      dockerfile: src/ProductApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ServerId: Node_2
      ConnectionStrings__WriteDb: Host=postgres-master;Port=5432;Database=${POSTGRESQL_DATABASE:-products_db};Username=postgres;Password=${POSTGRESQL_PASSWORD:-postgres}
      ConnectionStrings__ReadDb: Host=postgres-slave;Port=5432;Database=${POSTGRESQL_DATABASE:-products_db};Username=postgres;Password=${POSTGRESQL_PASSWORD:-postgres}
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: products-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-node-1
      - api-node-2

volumes:
  postgres_master_data:
  postgres_slave_data:
